name: CI
on:
  push:
    branches:
      - master
  schedule:
    - cron: 0 3,15 * * *
  workflow_dispatch:
    inputs:
      zyte:
        type: boolean
      purge_listing:
        type: boolean
        default: true
      purge_facility:
        type: boolean
        default: true
      purge_geocode:
        type: boolean

concurrency:
  group: cache
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -v ./...

  cache:
    needs: [test]
    name: Update cached pages
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'pgaskin/ottrec' }}
    steps:
      - name: Checkout scraper
        uses: actions/checkout@v6

      - name: Checkout cache
        uses: actions/checkout@v6
        with:
          repository: pgaskin/ottrec-data
          ref: cache
          path: cache
          filter: blob:none
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - run: go run ./scraper -cache cache -geocodio -fetch
          ${{ case(inputs.zyte == true, '-zyte 150', '') }}
          ${{ case(inputs.purge_listing == true || github.event_name == 'schedule', '-cache.purge.listing', '') }}
          ${{ case(inputs.purge_facility == true || github.event_name == 'schedule', '-cache.purge.facility', '') }}
          ${{ case(inputs.purge_geocode == true, '-cache.purge.geocode', '') }}
        env:
          ZYTE_APIKEY: ${{ secrets.zyte_apikey }}
          GEOCODIO_APIKEY: ${{ secrets.geocodio_apikey }}
          OTTCA_SCRAPER_SECRET: ${{ secrets.ottca_scraper_secret }}

      - run: git -C cache add .
      - uses: pgaskin/push-signed-commits@v1
        with:
          path: cache
          commit-message: ${{ case(github.event_name == 'schedule', 'full', github.event_name == 'workflow_dispatch', 'manual', 'partial') }} update (${{github.event_name}} ${{github.repository}}@${{github.sha}})
          repository: pgaskin/ottrec-data
          branch: cache
          app-id: ${{ vars.OTTREC_SCRAPER_APP_ID }}
          app-key: ${{ secrets.OTTREC_SCRAPER_PRIVATE_KEY }}

  scrape:
    needs: [test, cache]
    name: Scrape cached pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout scraper
        uses: actions/checkout@v6

      - name: Checkout cache
        uses: actions/checkout@v6
        with:
          repository: pgaskin/ottrec-data
          ref: cache
          path: cache
          filter: blob:none
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - run: git -C cache worktree add ../data v1
      - run: rm -fv data/data.*
      - run: go run ./scraper -cache cache -geocodio -scrape -export.pretty
          -export.proto data/data.proto
          -export.pb data/data.pb
          -export.textpb data/data.textpb
          -export.json data/data.json
          -export.errors errors.txt

      - run: git -C data add .
      - uses: actions/github-script@v9
        with:
          script: |
            core.setOutput('errors', require('fs').readFileSync('errors.txt', 'utf8').trimEnd())
            core.setOutput('cache', require('child_process').execSync('git -C cache rev-parse HEAD').toString().trim())
        id: meta
      - uses: pgaskin/push-signed-commits@v1
        with:
          path: data
          commit-message: |
            update (${{github.event_name}} ${{github.repository}}@${{github.sha}}, ${{steps.meta.outputs.cache}})

            ${{steps.meta.outputs.errors}}
          repository: pgaskin/ottrec-data
          branch: v1
          app-id: ${{ vars.OTTREC_SCRAPER_APP_ID }}
          app-key: ${{ secrets.OTTREC_SCRAPER_PRIVATE_KEY }}
        if: ${{ github.repository == 'pgaskin/ottrec' }}
